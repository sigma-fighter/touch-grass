<!DOCTYPE html>
<html>
<head>
    <title>Touch Grass AI - Permanent Brain 🌿</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
    
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        #video { border: 3px solid #2ecc71; border-radius: 10px; width: 100%; max-width: 400px; background: #000; }
        .controls { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #btn-grass { background: #2ecc71; color: white; }
        #btn-other { background: #e74c3c; color: white; }
        #btn-save { background: #3498db; color: white; width: 100%; margin-top: 10px; }
        #status { margin-top: 20px; font-size: 1.2rem; text-align: center; color: #f1c40f; }
    </style>
</head>
<body>
    <h1>🌿 Touch Grass AI</h1>
    <video autoplay playsinline muted id="video"></video>
    
    <div id="status">Đang khởi động AI...</div>

    <div class="controls">
        <button id="btn-grass">🌿 ĐÂY LÀ CỎ</button>
        <button id="btn-other">🚫 KHÔNG PHẢI CỎ</button>
        <button id="btn-save">💾 LƯU BỘ NÃO (DOWNLOAD JSON)</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const classifier = knnClassifier.create();
        let net;

        // 1. Mở Camera
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' },
                audio: false
            });
            video.srcObject = stream;
            return new Promise((resolve) => { video.onloadedmetadata = () => resolve(video); });
        }

        // 2. Hàm dạy AI (Train)
        async function addExample(classId) {
            const activation = net.infer(video, true);
            classifier.addExample(activation, classId);
            status.innerText = `Đã học mẫu cho: ${classId === 0 ? 'CỎ' : 'VẬT KHÁC'}`;
        }

        // 3. Hàm dự đoán (Predict)
        async function predict() {
            if (classifier.getNumClasses() > 0) {
                const activation = net.infer(video, true);
                const result = await classifier.predictClass(activation);
                const classes = ['🌿 BẠN ĐANG CHẠM CỎ!', '❌ ĐÂY KHÔNG PHẢI CỎ'];
                status.innerText = classes[result.label];
            }
            requestAnimationFrame(predict);
        }

        // 4. Hàm Lưu Bộ Não (Export JSON)
        function saveDataset() {
            const dataset = classifier.getClassifierDataset();
            const datasetObj = {};
            Object.keys(dataset).forEach((key) => {
                datasetObj[key] = Array.from(dataset[key].dataSync());
            });
            const blob = new Blob([JSON.stringify(datasetObj)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "dataset.json";
            a.click();
        }

        // 5. Khởi chạy chính
        async function main() {
    await setupCamera();
    status.innerText = "Đang nạp bộ não AI (MobileNet)...";
    net = await mobilenet.load();

    // 🚀 ĐOẠN NÀY LÀ ĐỂ ĐỌC FILE DATASET.JSON BẠN VỪA UPLOAD
    try {
        status.innerText = "Đang nạp dữ liệu từ file dataset.json...";
        const response = await fetch('./dataset.json'); 
        const datasetJson = await response.json();
        
        // Chuyển dữ liệu từ JSON ngược lại thành Tensor cho AI hiểu
        const dataset = {};
        Object.keys(datasetJson).forEach((key) => {
            dataset[key] = tf.tensor2d(datasetJson[key], [datasetJson[key].length / 1024, 1024]);
        });
        
        classifier.setClassifierDataset(dataset);
        status.innerText = "✅ Đã nạp bộ não! Đưa cam ra soi cỏ ngay!";
    } catch (err) {
        // Nếu chưa có file hoặc lỗi, AI sẽ ở chế độ chờ bạn dạy
        status.innerText = "⚠️ Chưa có dữ liệu. Hãy bấm nút để dạy AI!";
        console.log("Không tìm thấy file dataset hoặc file lỗi:", err);
    }

    // Lắng nghe các nút bấm (để bạn vẫn có thể dạy thêm nếu muốn)
    document.getElementById('btn-grass').addEventListener('click', () => addExample(0));
    document.getElementById('btn-other').addEventListener('click', () => addExample(1));
    document.getElementById('btn-save').addEventListener('click', saveDataset);

    predict();
}

        main();
    </script>
</body>
</html>
